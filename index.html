<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM Store - Admin Control</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* Navigation */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.98); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 5000; }
        .nav-btn { color: #555; text-align: center; flex: 1; cursor: pointer; font-size: 11px; }
        .nav-btn.active { color: var(--gold); }

        /* Pages */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Boxes & Cards */
        .luxury-box { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card); border-radius: 20px; border: 1px solid #222; overflow: hidden; position: relative; }
        .item-card img { width: 100%; height: 150px; object-fit: cover; }
        
        /* Inputs & Buttons */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; }
        .gold-btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; }
        .del-btn { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; margin-top: 5px; }

        /* Admin List */
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="home" class="page active">
    <h1 style="color:var(--gold); text-align:center; letter-spacing:3px;">ZM STORE</h1>
    <div class="grid" id="productGrid"></div>
</div>

<div id="cartPage" class="page">
    <h2 style="color:var(--gold);">سەبەتە</h2>
    <div id="cartList" class="luxury-box">سەبەتە بەتاڵە</div>
    <div class="luxury-box">
        <input type="text" id="custName" placeholder="ناوەکەت">
        <textarea id="custAddr" placeholder="ناونیشانی ورد"></textarea>
        <div id="finalPrice" style="color:var(--gold); font-weight:bold; margin:10px 0;">کۆی گشتی: ٠ د.ع</div>
        <button class="gold-btn" onclick="sendToWA()">ناردن بۆ واتسئاپ</button>
    </div>
</div>

<div id="profile" class="page">
    <div class="luxury-box" style="text-align:center;">
        <div style="width:60px; height:60px; background:var(--gold); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:25px; color:black; font-weight:bold;">Z</div>
        <h3 style="margin:0;">zakarya</h3>
    </div>

    <div class="luxury-box" onclick="showAdmin()" style="cursor:pointer; text-align: center; border-color: var(--gold);">
        بەڕێوبەرایەتی پڕۆژە (Admin) ⚙️
    </div>

    <div id="adminPanel" style="display:none;" class="luxury-box">
        <h4>زیادکردنی بۆنی نوێ</h4>
        <input id="pName" placeholder="ناوی بۆن">
        <input id="pPrice" placeholder="نرخ بۆ نموونە: 25,000">
        <input type="text" id="pImg" placeholder="لینکی وێنە (URL)">
        <button class="gold-btn" onclick="addNewProduct()">پاشەکەوتکردن</button>
        
        <h4 style="margin-top:25px; color:var(--gold);">بەڕێوەبردنی بەرهەمەکان</h4>
        <div id="adminProductList"></div>
    </div>
</div>

<div class="nav-bottom">
    <div class="nav-btn active" onclick="nav('home', this)">🏠<br>سەرەکی</div>
    <div class="nav-btn" onclick="nav('cartPage', this)">🛒<br>سەبەتە</div>
    <div class="nav-btn" onclick="nav('profile', this)">👤<br>پڕۆفایل</div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('zm_store_data')) || [];
    let cart = [];

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'profile') renderAdminList();
    }

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map((p, i) => `
            <div class="item-card">
                <img src="${p.img || 'https://via.placeholder.com/150'}">
                <div style="padding:10px;">
                    <h5 style="margin:0; font-size:13px;">${p.name}</h5>
                    <div style="color:var(--gold); margin:5px 0; font-weight:bold;">${p.price} د.ع</div>
                    <button onclick="addToCart(${i})" style="width:100%; padding:8px; border:none; border-radius:10px; background:#222; color:white; cursor:pointer;">کڕین</button>
                </div>
            </div>
        `).join('');
    }

    function renderAdminList() {
        const list = document.getElementById('adminProductList');
        list.innerHTML = products.map((p, i) => `
            <div class="admin-list-item">
                <span>${p.name}</span>
                <button class="del-btn" onclick="deleteProduct(${i})">سڕینەوە 🗑️</button>
            </div>
        `).join('');
    }

    function addNewProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        if(name && price) {
            products.push({name, price, img});
            saveAndRefresh();
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pImg').value = '';
        }
    }

    function deleteProduct(index) {
        if(confirm("ئایا دڵنیایت لە سڕینەوەی ئەم بەرهەمە؟")) {
            products.splice(index, 1);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('zm_store_data', JSON.stringify(products));
        render();
        renderAdminList();
    }

    function addToCart(i) {
        cart.push(products[i]);
        updateCartUI();
        alert("زیادکرا بۆ سەبەتە ✅");
    }

    function updateCartUI() {
        const list = document.getElementById('cartList');
        let total = cart.reduce((s, item) => s + parseInt(item.price.replace(/,/g,'')), 0);
        list.innerHTML = cart.length === 0 ? "سەبەتە بەتاڵە" : cart.map(item => `• ${item.name} (${item.price} د.ع)`).join('<br>');
        document.getElementById('finalPrice').innerText = `کۆی گشتی: ${total.toLocaleString()} د.ع`;
    }

    function showAdmin() {
        let pass = prompt("کۆدی ئەدمین بنووسە:");
        if(pass === "1234") {
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("کۆد هەڵەیە!");
        }
    }

    function sendToWA() {
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddr').value;
        if(!name || !addr || cart.length === 0) return alert("تکایە زانیارییەکان پڕ بکەرەوە");
        
        let items = cart.map(c => "- " + c.name).join('\n');
        let msg = `🛒 داواکاری نوێ لە ZM Store\n👤 کڕیار: ${name}\n📍 ناونیشان: ${addr}\n📦 کاڵاکان:\n${items}`;
        window.open(`https://wa.me/9647507131541?text=${encodeURIComponent(msg)}`);
    }

    render();
</script>

</body>
</html>
