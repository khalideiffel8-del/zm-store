<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE - Admin Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 70px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-btn { color: #555; text-align: center; flex: 1; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .nav-btn.active { color: var(--gold); font-weight: bold; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: var(--card); border-radius: 12px; border: 1px solid #222; overflow: hidden; position: relative; }
        .item-card img { width: 100%; height: 160px; object-fit: cover; }
        .price { color: var(--gold); font-weight: bold; margin-top: 5px; font-size: 14px; }
        .admin-form input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h1 style="text-align:center; color:var(--gold); letter-spacing: 2px;">ZM STORE</h1>
        <div id="productGrid" class="grid"></div>
    </div>

    <div id="admin" class="page">
        <h2 style="color:var(--gold);">زیادکردنی بۆنی نوێ</h2>
        <div class="admin-form">
            <input type="text" id="pName" placeholder="ناوی بۆن">
            <input type="text" id="pPrice" placeholder="نرخ (بۆ نموونە: 65,000)">
            <input type="text" id="pImg" placeholder="لینکی وێنە (URL)">
            <button class="btn-add" onclick="addProduct()">پاشەکەوتکردن لە بنکەی زانیاری</button>
        </div>
        <p style="font-size: 12px; color: #777; margin-top: 20px;">تێبینی: هەرچی لێرە زیاد بکەیت، هەموو کڕیارەکان یەکسەر دەیبینن.</p>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="showPage('home', this)">🏠<br>سەرەکی</div>
        <div class="nav-btn" onclick="showPage('admin', this)">👤<br>ئەدمین</div>
    </div>

    <script>
        // بەستنەوە بە Firebase ی تایبەت بە زاکۆ
        const firebaseConfig = {
            apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
            authDomain: "zm-parfum.firebaseapp.com",
            databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
            projectId: "zm-parfum",
            storageBucket: "zm-parfum.appspot.com",
            messagingSenderId: "262863453215",
            appId: "1:262863453215:web:e11023e5ed827b0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;

            if(name && price && img) {
                const newProductRef = db.ref('products').push();
                newProductRef.set({ name, price, img }, () => {
                    alert("بۆنەکە بە سەرکەوتوویی زیاد کرا!");
                    document.getElementById('pName').value = '';
                    document.getElementById('pPrice').value = '';
                    document.getElementById('pImg').value = '';
                    showPage('home', document.querySelector('.nav-btn'));
                });
            } else {
                alert("تکایە هەموو خانەکان پڕ بکەرەوە");
            }
        }

        // خوێندنەوەی داتاکان لە Firebase بۆ ناو سایتەکە بە شێوەی زیندوو
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            if(data) {
                Object.values(data).reverse().forEach(p => {
                    grid.innerHTML += `
                        <div class="item-card">
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                            <div style="padding:10px;">
                                <div style="font-size:13px; height: 32px; overflow: hidden;">${p.name}</div>
                                <div class="price">${p.price} د.ع</div>
                            </div>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
