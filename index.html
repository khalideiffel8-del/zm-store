<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZM STORE | Premium Shop</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>

:root{
    --gold:#d4af37;
    --bg:#f0f2f5;
    --card:#ffffff;
    --text:#1c1e21;
    --red:#ff4757;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',Tahoma,sans-serif;
    padding-bottom:120px;
}

/* HEADER */

.header{
    background:#000;
    color:var(--gold);
    text-align:center;
    padding:20px;
    box-shadow:0 3px 15px rgba(0,0,0,0.2);
}

.header h1{
    font-size:24px;
    letter-spacing:2px;
}

.top-contact{
    background:#111;
    color:white;
    text-align:center;
    padding:10px;
    font-size:14px;
}

.top-contact a{
    color:var(--gold);
    text-decoration:none;
    font-weight:bold;
}

/* SEARCH */

.search-box{
    width:92%;
    margin:15px auto 5px auto;
}

.search-box input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.06);
    font-size:15px;
}

/* 🌟 NEW SCROLLABLE CATEGORIES (وەک وێنەکە) 🌟 */
.categories-container {
    width: 100%;
    background: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 99;
    padding: 10px 0;
    margin-bottom: 15px;
}

.categories-scroll {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    white-space: nowrap;
    padding: 5px 15px;
    scrollbar-width: none; /* بۆ شاردنەوەی سکرۆڵ لە فایەرفۆکس */
}

.categories-scroll::-webkit-scrollbar {
    display: none; /* بۆ شاردنەوەی سکرۆڵ لە فرۆم و سەفاری */
}

.cat-tab {
    font-size: 16px;
    font-weight: bold;
    color: #555;
    cursor: pointer;
    padding: 8px 4px;
    position: relative;
    transition: 0.3s;
    border: none;
    background: none;
}

.cat-tab.active-tab {
    color: var(--red); /* ڕەنگی دەقی چالاک وەک وێنەکە */
}

/* هێڵەکەی ژێر دوگمەکە وەک وێنەکە */
.cat-tab.active-tab::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--red);
    border-radius: 2px;
}

/* CATEGORY SECTIONS */
.category-section {
    width: 95%;
    margin: 0 auto 20px auto;
    display: none; /* سەرەتا لادەبرێن تا کلیکیان لێنەکرێت */
}

.category-section.active-section {
    display: block; /* تەنها بەشی دیاریکراو پیشان دەدات */
}

.category-title-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    color: #000;
    padding: 10px 5px;
    margin-bottom: 10px;
    border-bottom: 1px dashed #ddd;
}

.category-title-box h2 {
    font-size: 18px;
}

.more-btn {
    background: #000;
    color: var(--gold);
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    font-size: 11px;
}

/* NAVIGATION */

.nav-bottom{
    position:fixed;
    bottom:15px;
    left:5%;
    width:90%;
    background:rgba(255,255,255,0.95);
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index:1000;
}

.nav-btn{
    border:none;
    background:none;
    color:#888;
    text-align:center;
    cursor:pointer;
    flex:1;
    font-size:11px;
    transition:0.3s;
}

.nav-btn.active{
    color:var(--gold);
    transform:translateY(-4px);
}

/* ADS */

.ads-slider{
    width:95%;
    height:190px;
    margin:15px auto;
    border-radius:22px;
    overflow:hidden;
    background:#ddd;
    position:relative;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.ad-slide{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.ad-slide.active{
    display:block;
    animation:fadeIn 0.8s;
}

/* PRODUCT */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:5px;
}

.item-card{
    background:white;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.35s;
}

.item-card:hover{
    transform:translateY(-5px) scale(1.02);
}

.img-box{
    background:linear-gradient(145deg,#fff,#f5f5f5);
    height:170px;
    padding:10px;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    transition:0.4s;
}

.item-card:hover img{
    transform:scale(1.08);
}

.badge-sale{
    position:absolute;
    top:10px;
    left:10px;
    background:var(--red);
    color:white;
    padding:5px 10px;
    border-radius:10px;
    font-size:10px;
    font-weight:bold;
}

.badge-guarantee{
    position:absolute;
    top:10px;
    right:10px;
    background:#2ecc71;
    color:white;
    padding:5px 10px;
    border-radius:10px;
    font-size:10px;
}

.info{
    padding:12px;
    text-align:center;
}

.info b{
    display:block;
    font-size:14px;
    margin-bottom:5px;
    height:38px;
    overflow:hidden;
}

.desc-text{
    font-size:11px;
    color:#777;
    margin:5px 0;
    height:30px;
    overflow:hidden;
}

.price{
    font-size:18px;
    font-weight:bold;
    margin:8px 0;
}

/* BUTTON */

.add-cart-btn{
    width:100%;
    border:none;
    padding:13px;
    border-radius:16px;
    background:linear-gradient(45deg,#d4af37,#f7d774);
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    font-size:13px;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(212,175,55,0.3);
}

.add-cart-btn:hover{
    transform:scale(1.03);
}

.btn-main{
    width:100%;
    border:none;
    background:#000;
    color:var(--gold);
    padding:14px;
    border-radius:15px;
    font-weight:bold;
    cursor:pointer;
}

/* PAGES */

.page{
    display:none;
}

.page.active{
    display:block;
}

/* ADMIN */

.admin-container{
    padding:15px;
}

.admin-room{
    background:white;
    border-radius:25px;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin-room h3{
    margin-bottom:15px;
}

input,textarea,select{
    width:100%;
    padding:13px;
    margin:8px 0;
    border-radius:14px;
    border:1px solid #eee;
    background:#fafafa;
}

/* CART */

.cart-item{
    background:white;
    margin:10px;
    padding:12px;
    border-radius:18px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.cart-item img{
    width:65px;
    height:65px;
    border-radius:15px;
    object-fit:cover;
}

.cart-price{
    color:#2ecc71;
    margin-top:5px;
}

/* PROMO */

.promo-box,
.note-box,
.wheel-box{
    width:92%;
    margin:15px auto;
    background:white;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

#cartTotal{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin:20px;
}

#orderBtn{
    width:90%;
    margin:auto;
    display:block;
    background:linear-gradient(45deg,#25d366,#128c7e);
    color:white;
}

/* ANIMATION */

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

</style>
</head>

🛒<br>

<script>

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
projectId: "zm-parfum",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
let currentRoom = "general";

/* VISITOR */

let visitorRef = db.ref("visitors");

visitorRef.transaction(current=>{
return (current || 0)+1;
});

visitorRef.on('value',snap=>{
let el=document.getElementById("visitorCount");
if(el){
el.innerText=snap.val() || 0;
}
});

/* FORMAT */

function formatPrice(num){
return Number(num).toLocaleString();
}

/* PAGE */

function showPage(id,btn){

document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document.querySelectorAll('.nav-btn')
.forEach(b=>b.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

btn.classList.add('active');

if(id==="cartPage"){
updateCartUI();
}

}

/* 🌟 FUNCTION TO SWITCH CATEGORIES 🌟 */
function switchCategory(catId, btnElement) {
    // لادانی هێڵ و ڕەنگی سووری کۆن
    document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active-tab'));
    // چالاککردنی دوگمە نوێیەکە
    btnElement.classList.add('active-tab');

    // شاردنەوەی هەموو بەشەکان
    document.querySelectorAll('.category-section').forEach(sec => sec.classList.remove('active-section'));
    // پیشاندانی ئەو بەشەی کڕیار کلیکی لێکردووە
    document.getElementById(catId + 'Sec').classList.add('active-section');
}

/* SEARCH */

function searchProducts(){

let input=document.getElementById("searchInput")
.value.toLowerCase();

let cards=document.querySelectorAll(".item-card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

if(text.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

/* PRODUCTS */

db.ref('products').on('value',snap=>{

const perfumeGrid=document.getElementById('perfumeGrid');
const shampooGrid=document.getElementById('shampooGrid');
const menGrid=document.getElementById('menGrid');
const creamGrid=document.getElementById('creamGrid');
const otherGrid=document.getElementById('otherGrid');

const adminList=document.getElementById('adminProductList');

perfumeGrid.innerHTML='';
shampooGrid.innerHTML='';
menGrid.innerHTML='';
creamGrid.innerHTML='';
otherGrid.innerHTML='';
adminList.innerHTML='';

const data=snap.val();

if(data){

Object.keys(data).reverse().forEach(key=>{

const p=data[key];

let productHTML = `
<div class="item-card">

${p.type==='sale' ?
'<div class="badge-sale">SALE 🔥</div>' : ''}

${p.type==='guarantee' ?
'<div class="badge-guarantee">گرێنتی ✅</div>' : ''}

<div class="img-box">
<img src="${p.img}">
</div>

<div class="info">

<b>${p.name}</b>

<div class="desc-text">
${p.desc || ''}
</div>

<div class="price">
${formatPrice(p.price)} د.ع
</div>

<button class="add-cart-btn"
onclick="addToCart('${p.name}',
'${p.price}',
'${p.img}')">

زیادکردن بۆ سەبەتە 🛒

</button>

</div>

</div>
`;

if(p.category === 'perfume') perfumeGrid.innerHTML += productHTML;
else if(p.category === 'shampoo') shampooGrid.innerHTML += productHTML;
else if(p.category === 'men') menGrid.innerHTML += productHTML;
else if(p.category === 'cream') creamGrid.innerHTML += productHTML;
else otherGrid.innerHTML += productHTML;

if(currentRoom === "general" || p.room === currentRoom) {
    adminList.innerHTML += `
    <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
    ">
    <span>${p.name} <small style="color:blue;">(${p.room || 'گشتی'})</small></span>
    <div>
        <button onclick="editProduct('${key}')" style="background:#d4af37;color:black;border:none;padding:8px 12px;border-radius:10px;margin-left:5px;cursor:pointer;">دەسکاری</button>
        <button onclick="db.ref('products/${key}').remove()" style="background:red;color:white;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;">سڕینەوە</button>
    </div>
    </div>
    `;
}

});

}

});

/* ADS */

db.ref('ads').on('value',snap=>{

const slider=document.getElementById('adSlider');

const adminAdList=document.getElementById('adminAdList');

slider.innerHTML='';
adminAdList.innerHTML='';

const ads=snap.val();

if(ads){

Object.keys(ads).forEach((key,i)=>{

slider.innerHTML += `
<img src="${ads[key].img}"
class="ad-slide ${i===0?'active':''}">
`;

adminAdList.innerHTML += `
<div style="padding:10px; display:flex; justify-content:space-between;">

<span>ڕیکلامی ${i+1}</span>

<button onclick="db.ref('ads/${key}').remove()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">

سڕینەوە

</button>

</div>
`;

});

}

});

/* SLIDER */

setInterval(()=>{

const slides=document.querySelectorAll('.ad-slide');

if(slides.length>0){

let active=document.querySelector('.ad-slide.active');

active.classList.remove('active');

(active.nextElementSibling || slides[0])
.classList.add('active');

}

},4000);

/* SAVE & UPDATE PRODUCT */

function saveProduct(){

const pKey = document.getElementById('pKey').value;

const p={
name:document.getElementById('pName').value,
price:document.getElementById('pPrice').value,
desc:document.getElementById('pDesc').value,
img:document.getElementById('pImg').value,
category:document.getElementById('pCategory').value,
type:document.getElementById('pType').value,
room: currentRoom
};

if(p.name && p.price && p.img){
    if(pKey) {
        db.ref('products/' + pKey).update(p, ()=>{
            alert("بەرهەمەکە بە سەرکەوتوویی نوێکرایەوە ✅");
            clearForm();
        });
    } else {
        db.ref('products').push().set(p,()=>{
            alert("بەرهەم زیادکرا ✅");
            clearForm();
        });
    }
} else {
    alert("تکایە هەموو خانەکان پڕبکەرەوە ❌");
}

}

/* EDIT PRODUCT FUNCTION */
function editProduct(key) {
    db.ref('products/' + key).once('value', snap => {
        const p = snap.val();
        if(p) {
            document.getElementById('pKey').value = key;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pDesc').value = p.desc || '';
            document.getElementById('pImg').value = p.img;
            document.getElementById('pCategory').value = p.category || 'other';
            document.getElementById('pType').value = p.type;
            
            document.getElementById('formActionTitle').innerText = "✏️ دەسکاری کردنی بەرهەم";
            document.getElementById('saveBtn').innerText = "تۆمارکردنی گۆڕانکارییەکان";
            
            document.getElementById('adminArea').scrollTop = 0;
        }
    });
}

function clearForm() {
    document.getElementById('pKey').value = '';
    document.getElementById('pName').value = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pDesc').value = '';
    document.getElementById('pImg').value = '';
    document.getElementById('formActionTitle').innerText = "📦 زیادکردنی بەرهەم";
    document.getElementById('saveBtn').innerText = "بڵاوکردنەوە";
}

/* PROMO */

    discount=2000; 
    usedPromo = "zako";
    alert("کۆدی zako چالاک بوو! داشکاندن جێبەجێکرا ✅");
} else if(code==="ZM100"){

discount=1000;
usedPromo = "ZM100";

}else if(code==="ZM5000"){

discount=5000;
usedPromo = "ZM5000";
alert("٥٠٠٠ د.ع داشکاو ✅");

}else {
    alert("کۆدی هەڵە ❌");
}

updateCartUI();

}

/* CART UI */

function updateCartUI(){

const list=document.getElementById('cartList');

list.innerHTML='';

let total=0;

cart.forEach(item=>{

list.innerHTML += `

<div class="cart-item">

<img src="${item.img}">

<div style="flex:1;">

<div>
${item.name}
</div>

<div class="cart-price">
${formatPrice(item.price)} د.ع
</div>

</div>

</div>

`;

total += parseInt(item.price);

});

total=total-discount;

if(total<0){
total=0;
}

document.getElementById('cartTotal')
.innerText=
"کۆی گشتی : "
+ formatPrice(total)
+ " د.ع";

document.getElementById('orderBtn')
.style.display=
cart.length>0 ? 'block' : 'none';

}

/* WHATSAPP */

function sendToWhatsApp(){

let note= document.getElementById("customerNote").value || "تێبینی نییە";

let msg= "سڵاو، داواکاریم هەیە:%0A%0A";

cart.forEach(i=>{
msg += `- ${i.name} (${formatPrice(i.price)} د.ع)%0A`;
});

msg += `%0A🎁 پرۆمۆ کۆد : ${usedPromo}`;
msg += `%0A🎁 داشکاندن : ${formatPrice(discount)} د.ع`;
msg += `%0A📝 تێبینی کڕیار : ${note}`;

window.open(
`https://wa.me/9647507131541?text=${msg}`
);

}
