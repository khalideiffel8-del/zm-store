<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE | بۆن و جوانکاری</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000000; --card: #111111; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header { text-align: center; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #333; }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 3px; font-size: 24px; text-transform: uppercase; }

        /* Ads Slider */
        .ads-slider { width: 100%; height: 220px; overflow: hidden; position: relative; background: #050505; border-bottom: 2px solid var(--gold); }
        .ad-slide { width: 100%; height: 100%; display: none; object-fit: cover; }
        .ad-slide.active { display: block; animation: fadeIn 0.8s; }

        /* Category Menu */
        .category-menu { display: flex; overflow-x: auto; padding: 15px 10px; gap: 10px; background: #000; position: sticky; top: 0; z-index: 100; scrollbar-width: none; }
        .category-menu::-webkit-scrollbar { display: none; }
        .cat-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 10px 20px; border-radius: 25px; white-space: nowrap; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .cat-btn.active { background: var(--gold); color: black; border-color: var(--gold); font-weight: bold; }

        .page { display: none; padding: 15px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card); border-radius: 20px; border: 1px solid #222; overflow: hidden; position: relative; transition: 0.3s; }
        .img-container { position: relative; width: 100%; height: 160px; background: #fff; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
        .watermark { position: absolute; bottom: 8px; left: 8px; background: rgba(212, 175, 55, 0.9); color: black; font-weight: bold; font-size: 10px; padding: 3px 7px; border-radius: 5px; }

        .item-info { padding: 12px; text-align: center; }
        .item-info b { font-size: 15px; display: block; margin-bottom: 5px; color: #eee; }
        .price { color: var(--gold); font-weight: bold; font-size: 16px; margin-bottom: 10px; display: block; }
        .add-to-cart { background: var(--gold); color: black; border: none; width: 100%; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Toast Notification */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; z-index: 10000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: none; animation: slideUp 0.3s forwards; }
        @keyframes slideUp { from { bottom: 50px; opacity: 0; } to { bottom: 100px; opacity: 1; } }

        /* Bottom Nav */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-btn { color: #666; text-align: center; flex: 1; font-size: 12px; cursor: pointer; position: relative; text-decoration: none; }
        .nav-btn.active { color: var(--gold); }
        .badge { position: absolute; top: -5px; right: 20%; background: #e74c3c; color: white; font-size: 11px; padding: 2px 7px; border-radius: 50%; border: 2px solid #0a0a0a; }

        /* Admin & Cart Lists */
        .cart-item, .admin-list-item { background: #111; padding: 12px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .cart-item img, .admin-list-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .btn-gold { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header"><h1>ZM STORE</h1></div>

    <div id="home" class="page active">
        <div class="ads-slider" id="adSlider"></div>
        
        <div class="category-menu">
            <div class="cat-btn active" onclick="filterProducts('هەمووی', this)">هەمووی</div>
            <div class="cat-btn" onclick="filterProducts('بۆنی جسم', this)">بۆنی جسم</div>
            <div class="cat-btn" onclick="filterProducts('دژە خۆر', this)">دژە خۆر</div>
            <div class="cat-btn" onclick="filterProducts('غسول', this)">غسول</div>
            <div class="cat-btn" onclick="filterProducts('شامپۆ', this)">شامپۆ</div>
        </div>

        <div id="productGrid" class="grid"></div>
    </div>

    <div id="cartPage" class="page">
        <h2 style="color:var(--gold)">🛒 سەبەتەکەم</h2>
        <div id="cartList"></div>
        <div id="cartTotal" style="margin: 20px 0; font-size: 18px; text-align: center; color: var(--gold);"></div>
        <button class="btn-gold" onclick="sendToWhatsApp()" id="orderBtn" style="display:none;">ناردنی داواکاری بۆ وەتسئاپ 📱</button>
    </div>

    <div id="admin" class="page">
        <div id="loginArea">
            <input type="password" id="adminPass" placeholder="پاسۆرد" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:white; border-radius:15px; box-sizing: border-box;">
            <button class="btn-gold" onclick="checkLogin()">داخڵبوون</button>
        </div>
        <div id="adminArea" style="display:none;">
            <div id="adminProductList"></div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="showPage('home', this)">🏠<br>سەرەکی</div>
        <div class="nav-btn" onclick="showPage('cartPage', this)">🛒<br>سەبەتە <span id="cartCount" class="badge">0</span></div>
        <div class="nav-btn" onclick="showPage('admin', this)">👤<br>ئەدمین</div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Firebase Configuration (Same as yours)
        const firebaseConfig = {
            apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
            authDomain: "zm-parfum.firebaseapp.com",
            databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
            projectId: "zm-parfum",
            storageBucket: "zm-parfum.appspot.com",
            messagingSenderId: "262863453215",
            appId: "1:262863453215:web:e11023e5ed827b0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let cart = JSON.parse(localStorage.getItem('zm_cart')) || [];

        // UI Functions
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'cartPage') updateCartUI();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        // Product Logic
        db.ref('products').on('value', snap => {
            const data = snap.val();
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    grid.innerHTML += `
                        <div class="item-card" data-cat="${p.cat}">
                            <div class="img-container">
                                <img src="${p.img}">
                                <div class="watermark">ZM STORE</div>
                            </div>
                            <div class="item-info">
                                <b>${p.name}</b>
                                <span class="price">${p.price} د.ع</span>
                                <button class="add-to-cart" onclick="addToCart('${p.name}', '${p.price}', '${p.img}')">🛒 زیادکردن</button>
                            </div>
                        </div>`;
                });
            }
        });

        function addToCart(name, price, img) {
            cart.push({name, price, img});
            localStorage.setItem('zm_cart', JSON.stringify(cart));
            updateCartCount();
            showToast("✅ زیاد کرا بۆ سەبەتە");
        }

        function updateCartCount() {
            document.getElementById('cartCount').innerText = cart.length;
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            const totalDiv = document.getElementById('cartTotal');
            list.innerHTML = cart.length ? '' : '<p style="text-align:center; color:#666;">سەبەتەکەت چۆڵە</p>';
            let total = 0;
            cart.forEach((item, i) => {
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div style="flex:1"><b>${item.name}</b><br><small>${item.price} د.ع</small></div>
                        <button onclick="removeFromCart(${i})" style="background:none; border:none; color:#ff4757; font-size:20px;">×</button>
                    </div>`;
                total += parseInt(item.price.replace(/,/g, '')) || 0;
            });
            totalDiv.innerHTML = cart.length ? `کۆی گشتی: ${total.toLocaleString()} د.ع` : '';
            document.getElementById('orderBtn').style.display = cart.length ? 'block' : 'none';
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            localStorage.setItem('zm_cart', JSON.stringify(cart));
            updateCartUI(); updateCartCount();
        }

        function sendToWhatsApp() {
            let msg = `سڵاو ZM STORE، داواکاریم هەیە:\n`;
            let total = 0;
            cart.forEach(item => {
                msg += `- ${item.name} (${item.price} د.ع)\n`;
                total += parseInt(item.price.replace(/,/g, '')) || 0;
            });
            msg += `\nکۆی گشتی: ${total.toLocaleString()} د.ع`;
            window.open(`https://wa.me/9647507131541?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function checkLogin() {
            if(document.getElementById('adminPass').value === '75331541') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
            }
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.item-card').forEach(card => {
                card.style.display = (cat === 'هەمووی' || card.getAttribute('data-cat') === cat) ? 'block' : 'none';
            });
        }

        // Ads Logic
        db.ref('ads').on('value', snap => {
            const ads = snap.val();
            const slider = document.getElementById('adSlider');
            slider.innerHTML = '';
            if(ads) {
                Object.values(ads).forEach((ad, i) => {
                    slider.innerHTML += `<img src="${ad.img}" class="ad-slide ${i===0?'active':''}">`;
                });
            }
        });

        setInterval(() => {
            const slides = document.querySelectorAll('.ad-slide');
            if(slides.length > 1) {
                let active = document.querySelector('.ad-slide.active');
                active.classList.remove('active');
                let next = active.nextElementSibling || slides[0];
                next.classList.add('active');
            }
        }, 4000);

        updateCartCount();
    </script>
</body>
</html>
