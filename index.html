<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; margin: 0; padding-bottom: 70px; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); color: var(--gold); }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #111; border: 1px solid #333; border-radius: 8px; overflow: hidden; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--gold); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; padding: 10px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .item-row { display: flex; justify-content: space-between; background: #000; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="header"><h1>ZM STORE</h1></div>

<div id="home" class="page active">
    <div id="slider" style="height:150px; background:#050505; margin-bottom:10px;"></div>
    <div class="grid" id="product-list"></div>
</div>

<div id="admin" class="page">
    <div id="login-form">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkPass()">Login</button>
    </div>
    <div id="admin-panel" style="display:none;">
        <div class="box">
            <h3>ڕیکلام و ڤیدیۆ</h3>
            <input type="text" id="v-url" placeholder="Video Link (.mp4)">
            <button onclick="saveVid()">Update Video</button>
            <input type="text" id="a-url" placeholder="Image Link" style="margin-top:10px;">
            <button onclick="addAd()">Add Slider Image</button>
        </div>
        <div class="box">
            <h3>بەرهەمی نوێ</h3>
            <input type="text" id="p-n" placeholder="Name">
            <input type="text" id="p-p" placeholder="Price">
            <input type="text" id="p-i" placeholder="Image URL">
            <button onclick="addP()">Publish</button>
        </div>
        <div id="admin-items"></div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" id="n-home" onclick="show('home')">🏠<br>Home</div>
    <div class="nav-item" id="n-admin" onclick="show('admin')">👤<br>Admin</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
        databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
        projectId: "zm-parfum"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id).classList.add('active');
    }

    function checkPass() {
        if(document.getElementById('pass').value === '75331541') {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("هەڵەیە!"); }
    }

    function saveVid() { db.ref('settings/v').set(document.getElementById('v-url').value); }
    function addAd() { db.ref('ads').push().set({img: document.getElementById('a-url').value}); }
    function addP() {
        const n = document.getElementById('p-n').value;
        const p = document.getElementById('p-p').value;
        const i = document.getElementById('p-i').value;
        if(n && p && i) db.ref('products').push().set({n, p, i});
    }

    db.ref('products').on('value', s => {
        const d = s.val();
        const list = document.getElementById('product-list');
        const aList = document.getElementById('admin-items');
        list.innerHTML = ''; aList.innerHTML = '';
        if(d) Object.keys(d).reverse().forEach(k => {
            const x = d[k];
            list.innerHTML += `<div class="card"><img src="${x.i}"><div style="padding:5px;"><b>${x.n}</b><br><span style="color:#d4af37">${x.p}</span></div></div>`;
            aList.innerHTML += `<div class="item-row"><span>${x.n}</span><button style="width:auto; background:red; padding:5px;" onclick="db.ref('products/${k}').remove()">X</button></div>`;
        });
    });

    db.ref('ads').on('value', s => {
        const d = s.val();
        const slider = document.getElementById('slider');
        if(d) {
            const first = Object.values(d)[0].img;
            slider.innerHTML = `<img src="${first}" style="width:100%; height:100%; object-fit:cover;">`;
        }
    });
</script>
</body>
</html>
