<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE | Premium Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #f8f9fa; --card: #ffffff; --text: #1a1a1a; --red: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Header */
        .header { text-align: center; padding: 20px; background: #000; color: var(--gold); }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 2px; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .item-card { background: var(--card); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        .img-box { width: 100%; height: 160px; background: #fff; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .pin-icon { position: absolute; top: 10px; right: 10px; background: var(--gold); color: black; padding: 4px; border-radius: 50%; font-size: 12px; z-index: 10; }
        .badge-sale { position: absolute; top: 10px; left: 10px; background: var(--red); color: white; padding: 3px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }

        .info { padding: 12px; text-align: center; }
        .price { color: #000; font-weight: 800; font-size: 16px; margin: 5px 0; }

        /* Admin Dashboard (Grid Style) */
        .admin-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .admin-box { background: #fff; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .admin-box i { font-size: 30px; display: block; margin-bottom: 10px; }
        
        /* Forms */
        .form-container { display: none; padding: 20px; background: #fff; margin: 15px; border-radius: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; box-sizing: border-box; }
        .btn-main { background: #000; color: var(--gold); border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-btn { color: #888; font-size: 12px; cursor: pointer; border: none; background: none; }
        .nav-btn.active { color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header"><h1>ZM STORE</h1></div>

    <div id="home" class="page active">
        <div id="productGrid" class="grid"></div>
    </div>

    <div id="admin" class="page">
        <div id="loginArea" style="padding:40px; text-align:center;">
            <input type="password" id="adminPass" placeholder="پاسۆردی ئەدمین">
            <button class="btn-main" onclick="checkLogin()">داخڵبوون</button>
        </div>

        <div id="adminArea" style="display:none;">
            <h2 style="text-align:center;">بەڕێوەبردن 👤</h2>
            
            <div class="admin-menu">
                <div class="admin-box" onclick="openRoom('roomAdd')">📦<br>پۆستی نوێ</div>
                <div class="admin-box" onclick="openRoom('roomAds')">🖼️<br>ڕیکلام</div>
                <div class="admin-box" onclick="openRoom('roomEdit')">📌<br>پین و ئیدیت</div>
                <div class="admin-box" onclick="location.reload()">🔄<br>ڕیفرێش</div>
            </div>

            <div id="roomAdd" class="form-container">
                <h3>زیادکردنی بەرهەم</h3>
                <input type="text" id="pName" placeholder="ناوی بەرهەم">
                <input type="number" id="pPrice" placeholder="نرخ">
                <textarea id="pDesc" placeholder="وەسفی بەرهەم"></textarea>
                <input type="text" id="pImg" placeholder="لینکی وێنە">
                <select id="pType">
                    <option value="normal">ئاسایی</option>
                    <option value="sale">داشکاندن 🔥</option>
                    <option value="guarantee">بە گرێنتی ✅</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">بڵاوکردنەوە</button>
            </div>

            <div id="roomEdit" class="form-container">
                <h3>📌 پین و سڕینەوە</h3>
                <div id="adminProductList"></div>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="showPage('home', this)">🏠<br>سەرەکی</div>
        <div class="nav-btn" onclick="showPage('admin', this)">👤<br>ئەدمین</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
            databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
            projectId: "zm-parfum",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openRoom(id) {
            document.querySelectorAll('.form-container').forEach(r => r.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // Real-time Display
        db.ref('products').on('value', snap => {
            const grid = document.getElementById('productGrid');
            const adminList = document.getElementById('adminProductList');
            grid.innerHTML = ''; adminList.innerHTML = '';
            let products = [];

            snap.forEach(child => {
                products.push({key: child.key, ...child.val()});
            });

            // ڕیزکردن بەپێی پین (ئەوانەی پینن دێنە سەرەوە)
            products.sort((a, b) => (b.pinned || 0) - (a.pinned || 0));

            products.forEach(p => {
                grid.innerHTML += `
                <div class="item-card">
                    ${p.pinned ? '<div class="pin-icon">📌</div>' : ''}
                    ${p.type === 'sale' ? '<div class="badge-sale">SALE 🔥</div>' : ''}
                    <div class="img-box"><img src="${p.img}"></div>
                    <div class="info">
                        <b>${p.name}</b>
                        <div class="price">${Number(p.price).toLocaleString()} د.ع</div>
                        <button class="btn-main" style="padding:8px; font-size:12px;">کڕین 🛒</button>
                    </div>
                </div>`;

                adminList.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
                    <span>${p.name}</span>
                    <div>
                        <button onclick="togglePin('${p.key}', ${p.pinned || false})" style="color:${p.pinned ? 'gold' : 'gray'}; background:none; border:none; cursor:pointer;">📌</button>
                        <button onclick="db.ref('products/${p.key}').remove()" style="color:red; background:none; border:none; margin-right:10px;">🗑️</button>
                    </div>
                </div>`;
            });
        });

        function togglePin(key, currentStatus) {
            db.ref('products/' + key).update({ pinned: !currentStatus });
        }

        function checkLogin() {
            if(document.getElementById('adminPass').value === '75331541') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
            }
        }

        function saveProduct() {
            const p = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                desc: document.getElementById('pDesc').value,
                img: document.getElementById('pImg').value,
                type: document.getElementById('pType').value,
                pinned: false
            };
            if(p.name && p.price) db.ref('products').push().set(p, () => alert("بڵاوکرایەوە!"));
        }
    </script>
</body>
</html>
