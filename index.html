<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE | Fix Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #1a1a1a; --text: #fff; --red: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* Header */
        .header { text-align: center; padding: 20px; background: #000; color: var(--gold); border-bottom: 1px solid #333; }
        
        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .item-card { background: var(--card); border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #333; }
        .img-box { width: 100%; height: 160px; background: #fff; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .pin-badge { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        
        /* Chat UI */
        #chat-panel { display: none; position: fixed; bottom: 85px; left: 10px; right: 10px; background: #fff; height: 400px; border-radius: 20px; z-index: 2000; flex-direction: column; color: #000; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg.user { align-self: flex-start; background: #eee; }
        .msg.admin { align-self: flex-end; background: var(--gold); }

        /* Admin Panels */
        .admin-section { display: none; padding: 20px; }
        .admin-box { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-btn { color: #888; background: none; border: none; font-size: 12px; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header"><h1>ZM STORE</h1></div>

    <div id="home" class="page">
        <div id="productGrid" class="grid"></div>
    </div>

    <div id="cartPage" class="page" style="display:none; padding:20px;">
        <h2>سەبەتەی کڕین 🛒</h2>
        <div id="cartItems"></div>
        <div id="totalPrice" style="font-size:20px; margin:20px 0;"></div>
        <button onclick="checkout()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">ناردنی داواکاری بۆ وەتسئاپ</button>
    </div>

    <div id="chat-panel">
        <div style="background:#000; color:var(--gold); padding:15px; border-radius:20px 20px 0 0;">چاتی ڕاستەوخۆ <span onclick="toggleChat()" style="float:left;">✖</span></div>
        <div id="chatMsgs" class="chat-msgs"></div>
        <div style="padding:10px; display:flex;">
            <input type="text" id="chatInput" placeholder="نامە بنووسە..." style="color:#000; background:#f0f0f0;">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--gold); font-weight:bold; padding:0 10px;">ناردن</button>
        </div>
    </div>

    <div id="admin" class="page" style="display:none; padding:15px;">
        <div id="loginArea">
            <input type="password" id="pass" placeholder="پاسۆرد">
            <button onclick="login()" style="width:100%; padding:10px; background:var(--gold); border:none;">چوونە ژوورەوە</button>
        </div>
        <div id="adminPanel" style="display:none;">
            <div class="admin-box">
                <h3>📦 زیادکردنی بەرهەم</h3>
                <input id="n" placeholder="ناو">
                <input id="p" type="number" placeholder="نرخ">
                <input id="i" placeholder="لینکی وێنە">
                <button onclick="addP()" style="width:100%; padding:10px; background:var(--gold); border:none;">بڵاوکردنەوە</button>
            </div>
            <div class="admin-box" id="adminList"></div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showP('home')">🏠<br>سەرەکی</button>
        <button class="nav-btn" onclick="showP('cartPage')">🛒<br>سەبەتە</button>
        <button class="nav-btn" onclick="toggleChat()">💬<br>چات</button>
        <button class="nav-btn" onclick="showP('admin')">👤<br>ئەدمین</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
            databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
            projectId: "zm-parfum",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const uid = localStorage.getItem('zm_id') || 'u' + Date.now();
        localStorage.setItem('zm_id', uid);

        let cart = [];

        // UI Logic
        function showP(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function toggleChat() {
            const c = document.getElementById('chat-panel');
            c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
        }

        // Product Rendering
        db.ref('products').on('value', snap => {
            const grid = document.getElementById('productGrid');
            const alist = document.getElementById('adminList');
            grid.innerHTML = ''; alist.innerHTML = '<h3>📌 پین و سڕینەوە</h3>';
            let prods = [];
            snap.forEach(c => prods.push({key: c.key, ...c.val()}));
            
            prods.sort((a,b) => (b.pinned || 0) - (a.pinned || 0));

            prods.forEach(p => {
                grid.innerHTML += `
                <div class="item-card">
                    ${p.pinned ? '<div class="pin-badge">PIN 📌</div>' : ''}
                    <div class="img-box"><img src="${p.img}"></div>
                    <div style="padding:10px; text-align:center;">
                        <b>${p.name}</b>
                        <div style="color:var(--gold); margin:5px 0;">${Number(p.price).toLocaleString()} د.ع</div>
                        <button onclick="addToCart('${p.name}', ${p.price})" style="width:100%; padding:8px; background:var(--gold); border:none; border-radius:5px;">کڕین 🛒</button>
                    </div>
                </div>`;
                
                alist.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${p.name}</span>
                    <div>
                        <button onclick="db.ref('products/${p.key}').update({pinned: ${p.pinned ? 0 : 1}})">📌</button>
                        <button onclick="db.ref('products/${p.key}').remove()">🗑️</button>
                    </div>
                </div>`;
            });
        });

        // Cart & WhatsApp
        function addToCart(n, p) {
            cart.push({name: n, price: p});
            alert("زیادکرا بۆ سەبەتە ✅");
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, index) => {
                container.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">${item.name} - ${Number(item.price).toLocaleString()} د.ع</div>`;
                total += parseInt(item.price);
            });
            document.getElementById('totalPrice').innerText = "کۆی گشتی: " + total.toLocaleString() + " د.ع";
        }

        function checkout() {
            if(cart.length === 0) return alert("سەبەتە چۆڵە!");
            let msg = "سڵاو ZM Store، داواکاری نوێ:\n";
            cart.forEach(i => msg += `- ${i.name}\n`);
            window.open(`https://wa.me/9647507131541?text=${encodeURIComponent(msg)}`);
        }

        // Chat Logic
        function sendMsg() {
            const input = document.getElementById('chatInput');
            if(input.value) {
                db.ref('chats/' + uid).push().set({text: input.value, sender: 'user'});
                input.value = '';
            }
        }

        db.ref('chats/' + uid).on('value', snap => {
            const box = document.getElementById('chatMsgs');
            box.innerHTML = '';
            snap.forEach(c => {
                const m = c.val();
                box.innerHTML += `<div class="msg ${m.sender}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // Admin Auth
        function login() {
            if(document.getElementById('pass').value === '75331541') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function addP() {
            const data = {
                name: document.getElementById('n').value,
                price: document.getElementById('p').value,
                img: document.getElementById('i').value,
                pinned: 0
            };
            if(data.name && data.price) db.ref('products').push().set(data, () => alert("بڵاوکرایەوە!"));
        }
    </script>
</body>
</html>
