<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE | بۆن و جوانکاری</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000000; --card: #111111; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 90px; }
        
        .header { text-align: center; padding: 20px; background: #0a0a0a; border-bottom: 1px solid #333; }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 3px; font-size: 24px; }

        /* Category Filter Menu */
        .category-menu { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #050505; sticky: top; top: 0; z-index: 100; }
        .cat-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; }
        .cat-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card); border-radius: 15px; border: 1px solid #222; overflow: hidden; position: relative; }
        .item-card img { width: 100%; height: 180px; object-fit: cover; }
        .item-info { padding: 10px; }
        .price { color: var(--gold); font-weight: bold; }
        .tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: var(--gold); padding: 2px 8px; border-radius: 5px; font-size: 10px; border: 0.5px solid var(--gold); }

        /* Admin Management */
        .admin-item { display: flex; align-items: center; background: #111; margin-bottom: 10px; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .admin-item img { width: 45px; height: 45px; border-radius: 5px; margin-left: 10px; object-fit: cover; }
        .admin-controls { display: flex; gap: 5px; margin-right: auto; }
        .btn-edit { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; }
        
        .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-btn { color: #666; text-align: center; flex: 1; font-size: 12px; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header"><h1>ZM STORE</h1></div>

    <div id="home" class="page active">
        <div class="category-menu" id="catMenu">
            <div class="cat-btn active" onclick="filterProducts('هەمووی', this)">هەمووی</div>
            <div class="cat-btn" onclick="filterProducts('بۆنی جسم', this)">بۆنی جسم</div>
            <div class="cat-btn" onclick="filterProducts('دژە خۆر', this)">دژە خۆر</div>
            <div class="cat-btn" onclick="filterProducts('غسول', this)">غسول</div>
            <div class="cat-btn" onclick="filterProducts('شامپۆ', this)">شامپۆ</div>
            <div class="cat-btn" onclick="filterProducts('بۆنی فەرەنسی', this)">بۆنی فەرەنسی</div>
        </div>
        <div id="productGrid" class="grid" style="margin-top:15px;"></div>
    </div>

    <div id="admin" class="page">
        <div id="loginArea">
            <h2 style="color:var(--gold)">چوونە ناوەوە</h2>
            <input type="password" id="adminPass" placeholder="پاسۆرد" style="width:100%; padding:12px; background:#111; border:1px solid #333; color:white; border-radius:10px;">
            <button class="btn-gold" style="margin-top:10px;" onclick="checkLogin()">داخڵبوون</button>
        </div>

        <div id="adminArea" style="display:none;">
            <div id="formTitle"><h2 style="color:var(--gold)">بڵاوکردنەوەی شتی نوێ</h2></div>
            <div class="admin-form">
                <input type="hidden" id="editKey">
                <input type="text" id="pName" placeholder="ناو">
                <input type="text" id="pPrice" placeholder="نرخ">
                <select id="pCat">
                    <option value="بۆنی جسم">بۆنی جسم</option>
                    <option value="دژە خۆر">دژە خۆر</option>
                    <option value="غسول">غسول</option>
                    <option value="شامپۆ">شامپۆ</option>
                    <option value="بۆنی فەرەنسی">بۆنی فەرەنسی</option>
                </select>
                <textarea id="pDesc" placeholder="وەسفی کورت" rows="2"></textarea>
                <input type="text" id="pImg" placeholder="لینکی وێنە">
                <button class="btn-gold" id="submitBtn" onclick="saveProduct()">بڵاوکردنەوە</button>
                <button class="btn-gold" id="cancelBtn" style="display:none; background:#444; color:white; margin-top:5px;" onclick="resetForm()">پاشگەزبوونەوە</button>
            </div>

            <h3 style="margin-top:30px; border-bottom:1px solid #333; padding-bottom:10px;">بەڕێوەبردن</h3>
            <div id="adminProductList"></div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="showPage('home', this)">🏠<br>سەرەکی</div>
        <div class="nav-btn" onclick="showPage('admin', this)">👤<br>ئەدمین</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
            authDomain: "zm-parfum.firebaseapp.com",
            databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
            projectId: "zm-parfum",
            storageBucket: "zm-parfum.appspot.com",
            messagingSenderId: "262863453215",
            appId: "1:262863453215:web:e11023e5ed827b0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allItems = {};

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function checkLogin() {
            if(document.getElementById('adminPass').value === '75331541') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
            } else { alert("پاسۆرد هەڵەیە!"); }
        }

        db.ref('products').on('value', (snapshot) => {
            allItems = snapshot.val() || {};
            renderHome('هەمووی');
            renderAdmin();
        });

        function renderHome(filter) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            Object.keys(allItems).reverse().forEach(key => {
                const p = allItems[key];
                if(filter === 'هەمووی' || p.cat === filter) {
                    grid.innerHTML += `
                        <div class="item-card">
                            <span class="tag">${p.cat}</span>
                            <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
                            <div class="item-info">
                                <div style="font-size:14px; font-weight:bold;">${p.name}</div>
                                <div class="price">${p.price} د.ع</div>
                            </div>
                        </div>`;
                }
            });
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderHome(cat);
        }

        function renderAdmin() {
            const adminList = document.getElementById('adminProductList');
            adminList.innerHTML = '';
            Object.keys(allItems).reverse().forEach(key => {
                const p = allItems[key];
                adminList.innerHTML += `
                    <div class="admin-item">
                        <img src="${p.img}">
                        <div style="font-size:12px;">${p.name} <br> <small style="color:var(--gold)">${p.cat}</small></div>
                        <div class="admin-controls">
                            <button class="btn-edit" onclick="editProduct('${key}', '${p.name}', '${p.price}', '${p.cat}', '${p.desc}', '${p.img}')">دەستکاری</button>
                            <button class="btn-delete" onclick="deleteProduct('${key}')">ڕەشکردنەوە</button>
                        </div>
                    </div>`;
            });
        }

        function saveProduct() {
            const key = document.getElementById('editKey').value;
            const product = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                cat: document.getElementById('pCat').value,
                desc: document.getElementById('pDesc').value,
                img: document.getElementById('pImg').value
            };
            if(product.name && product.price) {
                if(key) { db.ref('products/' + key).update(product).then(() => { alert("چاککرا"); resetForm(); }); }
                else { db.ref('products').push().set(product).then(() => { alert("بڵاوکرایەوە"); resetForm(); }); }
            }
        }

        function editProduct(key, name, price, cat, desc, img) {
            document.getElementById('editKey').value = key;
            document.getElementById('pName').value = name;
            document.getElementById('pPrice').value = price;
            document.getElementById('pCat').value = cat;
            document.getElementById('pDesc').value = desc;
            document.getElementById('pImg').value = img;
            document.getElementById('submitBtn').innerText = "پاشەکەوتکردنی گۆڕانکاری";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo(0,0);
        }

        function deleteProduct(key) { if(confirm("دڵنیای؟")) { db.ref('products/' + key).remove(); } }

        function resetForm() {
            document.getElementById('editKey').value = '';
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pImg').value = '';
            document.getElementById('submitBtn').innerText = "بڵاوکردنەوە";
            document.getElementById('cancelBtn').style.display = "none";
        }
    </script>
</body>
</html>
