<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZM STORE | Premium Shop</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
:root{
    --gold:#d4af37;
    --bg:#f0f2f5;
    --card:#ffffff;
    --text:#1c1e21;
    --red:#ff4757;
    --blue:#2e86de;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',Tahoma,sans-serif;
    padding-bottom:120px;
}

/* HEADER */

.header{
    background:#000;
    color:var(--gold);
    text-align:center;
    padding:20px;
    box-shadow:0 3px 15px rgba(0,0,0,0.2);
}

.header h1{
    letter-spacing:2px;
    font-size:24px;
}

.top-contact{
    background:#111;
    color:white;
    text-align:center;
    padding:10px;
    font-size:14px;
}

.top-contact a{
    color:var(--gold);
    text-decoration:none;
    font-weight:bold;
}

/* NAVIGATION */

.nav-bottom{
    position:fixed;
    bottom:15px;
    left:5%;
    width:90%;
    background:rgba(255,255,255,0.95);
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index:1000;
}

.nav-btn{
    border:none;
    background:none;
    color:#888;
    text-align:center;
    cursor:pointer;
    flex:1;
    font-size:11px;
    transition:0.3s;
}

.nav-btn i{
    display:block;
    font-size:22px;
    margin-bottom:5px;
}

.nav-btn.active{
    color:var(--gold);
    transform:translateY(-4px);
}

/* ADS */

.ads-slider{
    width:95%;
    height:190px;
    margin:15px auto;
    border-radius:22px;
    overflow:hidden;
    background:#ddd;
    position:relative;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.ad-slide{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.ad-slide.active{
    display:block;
    animation:fadeIn 0.8s;
}

/* PRODUCTS */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
}

.item-card{
    background:var(--card);
    border-radius:22px;
    overflow:hidden;
    position:relative;
    box-shadow:0 5px 20px rgba(0,0,0,0.06);
    transition:0.3s;
}

.item-card:hover{
    transform:translateY(-3px);
}

.img-box{
    width:100%;
    height:160px;
    background:white;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.badge-sale{
    position:absolute;
    top:10px;
    left:10px;
    background:var(--red);
    color:white;
    padding:5px 10px;
    border-radius:10px;
    font-size:10px;
    font-weight:bold;
}

.badge-guarantee{
    position:absolute;
    top:10px;
    right:10px;
    background:#2ecc71;
    color:white;
    padding:5px 10px;
    border-radius:10px;
    font-size:10px;
}

.info{
    padding:12px;
    text-align:center;
}

.info b{
    display:block;
    font-size:14px;
    margin-bottom:6px;
    height:38px;
    overflow:hidden;
}

.desc-text{
    color:#777;
    font-size:11px;
    height:30px;
    overflow:hidden;
}

.price{
    font-size:18px;
    font-weight:bold;
    margin:8px 0;
}

/* BUTTON */

.btn-main{
    width:100%;
    border:none;
    background:#000;
    color:var(--gold);
    padding:13px;
    border-radius:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-main:hover{
    transform:scale(1.02);
}

/* PAGES */

.page{
    display:none;
}

.page.active{
    display:block;
}

/* ADMIN */

.admin-container{
    padding:15px;
}

.admin-room{
    background:linear-gradient(145deg,#ffffff,#f3f3f3);
    border-radius:25px;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin-room h3{
    margin-bottom:15px;
    font-size:18px;
    color:#111;
}

input,textarea,select{
    width:100%;
    padding:13px;
    margin:8px 0;
    border-radius:14px;
    border:1px solid #eee;
    background:#fafafa;
}

/* CART */

.cart-item{
    background:white;
    margin:10px;
    padding:12px;
    border-radius:18px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.cart-item img{
    width:65px;
    height:65px;
    border-radius:15px;
    object-fit:cover;
}

.cart-item-name{
    font-weight:bold;
}

.cart-price{
    color:#2ecc71;
    margin-top:5px;
}

#cartTotal{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin:20px;
}

#orderBtn{
    width:90%;
    margin:auto;
    display:block;
    background:linear-gradient(45deg,#25d366,#128c7e);
    color:white;
    font-size:16px;
    box-shadow:0 8px 20px rgba(37,211,102,0.3);
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="header">
    <h1>ZM STORE</h1>
</div>

<div class="top-contact">
    📞 WhatsApp :
    <a href="https://wa.me/9647507131541">
        07507131541
    </a>
</div>

<!-- HOME -->

<div id="home" class="page active">

    <div class="ads-slider" id="adSlider"></div>

    <div id="productGrid" class="grid"></div>

</div>

<!-- CART -->

<div id="cartPage" class="page">

    <h2 style="text-align:center;margin-top:30px;">
        سەبەتەی کڕین 🛒
    </h2>

    <div id="cartList"></div>

    <div id="cartTotal"></div>

    <button class="btn-main" id="orderBtn" onclick="sendToWhatsApp()" style="display:none;">
        ناردنی داواکاری ✅
    </button>

</div>

<!-- ADMIN -->

<div id="admin" class="page">

    <div id="loginArea" style="padding:40px;text-align:center;">

        <input type="password" id="adminPass" placeholder="پاسۆردی ئەدمین">

        <button class="btn-main" onclick="checkLogin()">
            چوونە ژوورەوە
        </button>

    </div>

    <div id="adminArea" style="display:none;" class="admin-container">

        <!-- Visitors -->

        <div class="admin-room">

            <h3>👀 ئاماری سەردانکەر</h3>

            <div id="visitorCount"
            style="
            text-align:center;
            font-size:35px;
            color:#2e86de;
            font-weight:bold;
            ">
            0
            </div>

        </div>

        <!-- Add Product -->

        <div class="admin-room">

            <h3>📦 زیادکردنی بەرهەم</h3>

            <input type="text" id="pName" placeholder="ناوی بەرهەم">

            <input type="number" id="pPrice" placeholder="نرخ">

            <textarea id="pDesc" placeholder="وەسفی بەرهەم"></textarea>

            <input type="text" id="pImg" placeholder="لینکی وێنە">

            <select id="pType">
                <option value="normal">ئاسایی</option>
                <option value="sale">داشکاندن 🔥</option>
                <option value="guarantee">گرێنتی ✅</option>
            </select>

            <button class="btn-main" onclick="saveProduct()">
                بڵاوکردنەوە
            </button>

        </div>

        <!-- ADS -->

        <div class="admin-room">

            <h3>🖼️ بەڕێوەبردنی ڕیکلام</h3>

            <input type="text" id="adImg" placeholder="لینکی وێنە">

            <button class="btn-main" onclick="addAd()">
                زیادکردنی ڕیکلام
            </button>

            <div id="adminAdList"></div>

        </div>

        <!-- Products -->

        <div class="admin-room">

            <h3>📌 بەڕێوەبردنی بەرهەمەکان</h3>

            <div id="adminProductList"></div>

        </div>

    </div>

</div>

<!-- NAVIGATION -->

<div class="nav-bottom">

    <div class="nav-btn active" onclick="showPage('home', this)">
        🏠<br>سەرەکی
    </div>

    <div class="nav-btn" onclick="showPage('cartPage', this)">
        🛒<br>
        سەبەتە
        <span id="cartCount">0</span>
    </div>

    <div class="nav-btn" onclick="showPage('admin', this)">
        👤<br>ئەدمین
    </div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {
    apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
    databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
    projectId: "zm-parfum",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* VISITORS */

let visitorRef = db.ref("visitors");

visitorRef.transaction(current => {
    return (current || 0) + 1;
});

visitorRef.on('value', snap => {
    const el = document.getElementById("visitorCount");
    if(el){
        el.innerText = snap.val() || 0;
    }
});

/* PRICE */

function formatPrice(num){
    return Number(num).toLocaleString();
}

/* PAGE */

function showPage(id, btn){

    document.querySelectorAll('.page').forEach(p=>{
        p.classList.remove('active');
    });

    document.querySelectorAll('.nav-btn').forEach(b=>{
        b.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');

    btn.classList.add('active');

    if(id === 'cartPage'){
        updateCartUI();
    }
}

/* PRODUCTS */

db.ref('products').on('value', snap => {

    const grid = document.getElementById('productGrid');

    const adminList = document.getElementById('adminProductList');

    grid.innerHTML = '';

    adminList.innerHTML = '';

    const data = snap.val();

    if(data){

        Object.keys(data).reverse().forEach(key => {

            const p = data[key];

            grid.innerHTML += `
            <div class="item-card">

                ${p.type === 'sale' ? '<div class="badge-sale">SALE 🔥</div>' : ''}

                ${p.type === 'guarantee' ? '<div class="badge-guarantee">گرێنتی ✅</div>' : ''}

                <div class="img-box">
                    <img src="${p.img}">
                </div>

                <div class="info">

                    <b>${p.name}</b>

                    <div class="desc-text">
                        ${p.desc || ''}
                    </div>

                    <div class="price">
                        ${formatPrice(p.price)} د.ع
                    </div>

                    <button class="btn-main"
                    style="padding:10px;font-size:12px;"
                    onclick="addToCart('${p.name}','${p.price}','${p.img}')">

                    زیادکردن بۆ سەبەتە

                    </button>

                </div>

            </div>
            `;

            adminList.innerHTML += `
            <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px;
            border-bottom:1px solid #eee;
            ">

            <span style="font-size:13px;">
                ${p.name}
            </span>

            <button onclick="db.ref('products/${key}').remove()"
            style="
            border:none;
            background:red;
            color:white;
            padding:8px 12px;
            border-radius:10px;
            cursor:pointer;
            ">
            سڕینەوە
            </button>

            </div>
            `;
        });
    }
});

/* ADS */

db.ref('ads').on('value', snap => {

    const slider = document.getElementById('adSlider');

    const adminAdList = document.getElementById('adminAdList');

    slider.innerHTML = '';

    adminAdList.innerHTML = '';

    const ads = snap.val();

    if(ads){

        Object.keys(ads).forEach((key, i) => {

            slider.innerHTML += `
            <img src="${ads[key].img}"
            class="ad-slide ${i===0 ? 'active' : ''}">
            `;

            adminAdList.innerHTML += `
            <div style="padding:10px;">

                ڕیکلامی ${i+1}

                <button onclick="db.ref('ads/${key}').remove()"
                style="
                border:none;
                background:red;
                color:white;
                padding:5px 10px;
                border-radius:8px;
                ">
                سڕینەوە
                </button>

            </div>
            `;
        });
    }
});

/* SLIDER */

setInterval(() => {

    const slides = document.querySelectorAll('.ad-slide');

    if(slides.length > 0){

        let active = document.querySelector('.ad-slide.active');

        active.classList.remove('active');

        (active.nextElementSibling || slides[0]).classList.add('active');
    }

}, 4000);

/* SAVE PRODUCT */

function saveProduct(){

    const p = {

        name:document.getElementById('pName').value,

        price:document.getElementById('pPrice').value,

        desc:document.getElementById('pDesc').value,

        img:document.getElementById('pImg').value,

        type:document.getElementById('pType').value
    };

    if(p.name && p.price && p.img){

        db.ref('products').push().set(p, () => {

            alert("بەرهەم زیادکرا ✅");

        });
    }
}

/* ADD AD */

function addAd(){

    const img = document.getElementById('adImg').value;

    if(img){

        db.ref('ads').push().set({img}, () => {

            alert("ڕیکلام زیادکرا ✅");

        });
    }
}

/* LOGIN */

function checkLogin(){

    if(document.getElementById('adminPass').value === '75331541'){

        document.getElementById('loginArea').style.display = 'none';

        document.getElementById('adminArea').style.display = 'block';

    }else{

        alert("پاسۆرد هەڵەیە ❌");
    }
}

/* CART */

let cart = [];

function addToCart(n,p,i){

    cart.push({
        name:n,
        price:p,
        img:i
    });

    document.getElementById('cartCount').innerText = cart.length;

    alert("زیادکرا بۆ سەبەتە 🛒");
}

function updateCartUI(){

    const list = document.getElementById('cartList');

    list.innerHTML = '';

    let total = 0;

    cart.forEach(item => {

        list.innerHTML += `
        <div class="cart-item">

            <img src="${item.img}">

            <div style="flex:1;">

                <div class="cart-item-name">
                    ${item.name}
                </div>

                <div class="cart-price">
                    ${formatPrice(item.price)} د.ع
                </div>

            </div>

        </div>
        `;

        total += parseInt(item.price);
    });

    document.getElementById('cartTotal').innerText =
    "کۆی گشتی : " + formatPrice(total) + " د.ع";

    document.getElementById('orderBtn').style.display =
    cart.length > 0 ? 'block' : 'none';
}

/* WHATSAPP */

function sendToWhatsApp(){

    let msg = "سڵاو، داواکاریم هەیە:%0A%0A";

    cart.forEach(i => {

        msg += `- ${i.name} (${formatPrice(i.price)} د.ع)%0A`;

    });

    msg += `%0Aکۆی گشتی: ${formatPrice(
        cart.reduce((a,b)=>a + parseInt(b.price),0)
    )} د.ع`;

    window.open(`https://wa.me/9647507131541?text=${msg}`);
}

</script>

</body>
</html>
