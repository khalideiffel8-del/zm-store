<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM STORE | Ultimate Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #f8f9fa; --card: #ffffff; --text: #1a1a1a; --red: #ff4757; --green: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Header & Search */
        .header { background: #000; color: var(--gold); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .search-box { padding: 10px; background: #000; }
        .search-box input { width: 90%; padding: 10px; border-radius: 20px; border: none; outline: none; }

        /* Categories Scroll */
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 15px; background: #fff; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .cat-item { min-width: 70px; text-align: center; font-size: 11px; cursor: pointer; }
        .cat-img { width: 60px; height: 60px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; border: 2px solid transparent; }
        .cat-item.active .cat-img { border-color: var(--gold); background: #fff; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .item-card { background: var(--card); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        .img-box { width: 100%; height: 150px; background: #fff; position: relative; cursor: pointer; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        
        /* Badges */
        .post-logo { position: absolute; bottom: 5px; left: 5px; background: rgba(212, 175, 55, 0.8); color: #000; font-size: 8px; padding: 2px 5px; border-radius: 4px; }
        .badge-sale { position: absolute; top: 10px; right: 10px; background: var(--red); color: #fff; padding: 3px 8px; border-radius: 8px; font-size: 10px; }

        /* Details Overlay */
        .details-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        /* Admin Layout */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .admin-btn { background: #fff; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; cursor: pointer; }

        /* Nav Bottom */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-btn { color: #888; font-size: 11px; text-align: center; cursor: pointer; border: none; background: none; }
        .nav-btn.active { color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header"><h1>ZM STORE</h1></div>
    <div class="search-box"><input type="text" placeholder="بگەڕێ بۆ بەرهەمەکان..." onkeyup="search(this.value)"></div>

    <div class="categories" id="catList">
        <div class="cat-item active" onclick="filterCat('all')"><div class="cat-img">✨</div>هەمووی</div>
        <div class="cat-item" onclick="filterCat('بۆن')"><div class="cat-img">🌸</div>بۆن</div>
        <div class="cat-item" onclick="filterCat('پێست')"><div class="cat-img">🧴</div>پێست</div>
        <div class="cat-item" onclick="filterCat('شامپۆ')"><div class="cat-img">🧼</div>شامپۆ</div>
    </div>

    <div id="home" class="page active">
        <div id="productGrid" class="grid"></div>
    </div>

    <div id="detailsOverlay" class="details-overlay"></div>

    <div id="admin" class="page" style="display:none;">
        <div id="loginArea" style="padding:50px; text-align:center;">
            <input type="password" id="adminPass" placeholder="پاسۆرد">
            <button onclick="checkLogin()" class="btn-main" style="width:100%; margin-top:10px; padding:10px; background:#000; color:var(--gold); border-radius:10px;">چوونە ژوورەوە</button>
        </div>
        <div id="adminArea" style="display:none;">
            <div class="admin-grid">
                <div class="admin-btn" onclick="showRoom('addRoom')">➕ پۆست</div>
                <div class="admin-btn" onclick="showRoom('chatRoom')">💬 چاتەکان</div>
                <div class="admin-btn" onclick="showRoom('editRoom')">⚙️ پین</div>
                <div class="admin-btn" onclick="location.reload()">🔄 نوێکردنەوە</div>
            </div>
            
            <div id="addRoom" style="padding:15px; display:none;">
                <input type="text" id="pName" placeholder="ناوی بەرهەم">
                <input type="number" id="pPrice" placeholder="نرخ">
                <textarea id="pDesc" placeholder="وەسفی بەرهەم"></textarea>
                <input type="text" id="pImg" placeholder="لینکی وێنە">
                <select id="pCat">
                    <option value="بۆن">بۆن</option>
                    <option value="پێست">پێست</option>
                    <option value="شامپۆ">شامپۆ</option>
                </select>
                <button onclick="saveProduct()" style="width:100%; padding:15px; background:#000; color:var(--gold); border-radius:10px;">بڵاوکردنەوە</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="showPage('home', this)">🏠<br>سەرەکی</div>
        <div class="nav-btn" onclick="showPage('admin', this)">👤<br>ئەدمین</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCISwp1LFeCxcHvJigQblZb6BSTi",
            databaseURL: "https://zm-parfum-default-rtdb.firebaseio.com",
            projectId: "zm-parfum",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Products
        db.ref('products').on('value', snap => {
            window.allProducts = [];
            snap.forEach(c => { allProducts.push({id: c.key, ...c.val()}) });
            render(allProducts);
        });

        function render(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `
                <div class="item-card">
                    <div class="img-box" onclick="showDetails('${p.id}')">
                        <img src="${p.img}">
                        <div class="post-logo">ZM STORE</div>
                    </div>
                    <div style="padding:10px; text-align:center;">
                        <b style="font-size:13px;">${p.name}</b>
                        <div style="color:var(--red); font-weight:bold; margin-top:5px;">${Number(p.price).toLocaleString()} د.ع</div>
                        <button onclick="addToCart('${p.id}')" style="width:100%; background:#000; color:var(--gold); border:none; padding:8px; border-radius:10px; margin-top:8px;">زیادکردن 🛒</button>
                    </div>
                </div>`;
            });
        }

        function showDetails(id) {
            const p = allProducts.find(x => x.id === id);
            const overlay = document.getElementById('detailsOverlay');
            overlay.innerHTML = `
                <span class="close-btn" onclick="this.parentElement.style.display='none'">×</span>
                <img src="${p.img}" style="width:100%; height:350px; object-fit:contain; margin-top:50px;">
                <div style="padding:20px;">
                    <h2>${p.name}</h2>
                    <h3 style="color:var(--red)">${Number(p.price).toLocaleString()} د.ع</h3>
                    <p style="color:#666; line-height:1.6;">${p.desc || 'هیچ وەسفێک نییە'}</p>
                    <button style="width:100%; padding:15px; background:#000; color:var(--gold); border-radius:15px; font-weight:bold; font-size:18px;">زیادکردن بۆ سەبەتە 🛒</button>
                </div>
            `;
            overlay.style.display = 'block';
        }

        function filterCat(cat) {
            if(cat === 'all') render(allProducts);
            else render(allProducts.filter(x => x.cat === cat));
            document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function search(val) {
            render(allProducts.filter(x => x.name.toLowerCase().includes(val.toLowerCase())));
        }

        function checkLogin() {
            if(document.getElementById('adminPass').value === '75331541') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
            }
        }

        function showRoom(id) {
            document.getElementById('addRoom').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        function saveProduct() {
            const data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                desc: document.getElementById('pDesc').value,
                img: document.getElementById('pImg').value,
                cat: document.getElementById('pCat').value
            };
            db.ref('products').push().set(data, () => alert("بڵاوکرایەوە!"));
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
